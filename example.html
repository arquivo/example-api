<html>
<head>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="content"><p class="text-center text-muted mt-4">Loading...</p></div>
<script>
	const content = document.getElementById("content");

	function handler(response) {
		const html = response.response_items.map(item => `
			<div class="col offset-sm-2 col-sm-8 alert alert-primary" style="word-wrap:break-word">
				<a href="${item.linkToArchive}"><h4>${item.title}</h4></a>
				<strong><h5 class="text-dark">${item.tstamp.substr(0, 4)}</h5></strong>
				<h5 class="text-muted">${item.originalURL}</h5>
			</div>
		`).join("");
		content.innerHTML = html;
	}

	fetch("https://arquivo.pt/textsearch?q=sapo&maxItems=5&itemsPerSite=1")
		.then(res => res.json())
		.then(handler)
		.catch(err => {
			content.innerHTML = `<div class="col offset-sm-2 col-sm-8 alert alert-danger">Failed to load results: ${err.message}</div>`;
		});
</script>
</body>
</html>
